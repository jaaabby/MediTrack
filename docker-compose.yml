services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: meditrack-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-meditrack}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.up.sql:/docker-entrypoint-initdb.d/01-migrations.sql:ro
      - ./database/script.sql:/docker-entrypoint-initdb.d/02-script.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-meditrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meditrack-network

  # Backend Go
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meditrack-backend
    environment:
      # Base de datos
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-meditrack}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      
      # Servidor
      PORT: ${PORT:-8080}
      ENV: ${ENV:-production}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,https://localhost:3443}
      
      # Email
      EMAIL_DIR: ${EMAIL_DIR:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_SERVER: ${EMAIL_SERVER:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      
      # Redis (opcional)
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
    ports:
      - "${PORT:-8080}:8080"  # HTTP
      - "${HTTPS_PORT:-8443}:8443"  # HTTPS
    volumes:
      - ./backend/certs:/root/certs:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - meditrack-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Vue/Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meditrack-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"  # HTTP
      - "${FRONTEND_HTTPS_PORT:-3443}:3443"  # HTTPS
    volumes:
      - ./frontend/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - meditrack-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  meditrack-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

