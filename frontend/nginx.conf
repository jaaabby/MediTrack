events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # Servidor HTTP (puerto 3000)
    server {
        listen 3000;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # API proxy
        # Solo funciona en Docker Compose donde 'backend' se resuelve por nombre
        # En Railway/Cloud, usar VITE_API_BASE_URL en el frontend para apuntar directamente al backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            # Intentar resolver backend, si falla, retornar 502 para que el frontend use la URL directa
            resolver 127.0.0.11 valid=10s;
            set $backend_url http://backend:8080;
            proxy_pass $backend_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Si el backend no está disponible, permitir que el frontend haga la petición directamente
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_fallback;
        }
        
        # Fallback: si el proxy falla (backend no disponible en la red Docker)
        # el frontend debe usar VITE_API_BASE_URL para hacer peticiones directas
        location @api_fallback {
            return 502 '{"error":"Backend not available via proxy. Use VITE_API_BASE_URL environment variable in Railway."}';
            add_header Content-Type application/json;
        }

        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML5 History API support
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # Servidor HTTPS (puerto 3443) - Para acceso desde celular con cámara
    server {
        listen 3443 ssl http2;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Certificados SSL
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Configuración SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API proxy - Usar HTTPS para el backend cuando el frontend está en HTTPS
        # Solo funciona en Docker Compose donde 'backend' se resuelve por nombre
        # En Railway/Cloud, usar VITE_API_BASE_URL en el frontend para apuntar directamente al backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            resolver 127.0.0.11 valid=10s;
            set $backend_url https://backend:8443;
            # Intentar HTTPS primero, fallback a HTTP si no está disponible
            proxy_pass $backend_url;
            proxy_ssl_verify off;
            proxy_ssl_trusted_certificate /etc/nginx/certs/server.crt;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 3443;
            
            # Manejo de errores de conexión HTTPS
            proxy_next_upstream error timeout http_502 http_503;
            proxy_intercept_errors on;
            error_page 502 503 504 = @backend_fallback;
        }

        # Fallback a HTTP si HTTPS falla
        location @backend_fallback {
            resolver 127.0.0.11 valid=10s;
            set $backend_url http://backend:8080;
            proxy_pass $backend_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 3443;
            # Si también falla, retornar error para que el frontend use URL directa
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_fallback_https;
        }
        
        # Fallback final: si el proxy falla completamente
        location @api_fallback_https {
            return 502 '{"error":"Backend not available via proxy. Use VITE_API_BASE_URL environment variable in Railway."}';
            add_header Content-Type application/json;
        }

        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML5 History API support
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
} 